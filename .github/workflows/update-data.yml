name: Actualizar datos ELCANO

on:
  schedule:
    - cron: '0 6,18 * * *'   # Dos veces al día: 6:00 y 18:00 UTC
  workflow_dispatch:           # Permite lanzarlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar canales.json y agenda.json
        run: python scripts/build_data.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/canales.json data/agenda.json
          git diff --cached --quiet || git commit -m "chore: actualizar canales y agenda desde ELCANO [skip ci]"
          git push
